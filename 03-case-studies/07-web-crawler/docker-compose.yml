services:
  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: crawler
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d crawler"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mock-server:
    image: python:3.11-slim
    volumes:
      - ./mock_server.py:/mock_server.py
    command: >
      sh -c "pip install flask --quiet && python /mock_server.py"
    ports:
      - "5100:5100"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5100/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  crawler:
    image: python:3.11-slim
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://app:secret@db:5432/crawler
      MOCK_SERVER_URL: http://mock-server:5100
    volumes:
      - ./experiment.py:/experiment.py
    command: >
      sh -c "pip install redis psycopg2-binary mmh3 --quiet && python /experiment.py"
    profiles:
      - experiment
