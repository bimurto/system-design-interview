events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;

        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Proxy video requests to MinIO
        # Usage: GET /video/{bucket}/{object}
        location /video/ {
            # Strip /video prefix, forward to MinIO
            rewrite ^/video/(.*)$ /$1 break;
            proxy_pass http://minio:9000;
            proxy_set_header Host minio:9000;

            # Enable byte-range requests (critical for video seeking)
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            # Pass through range-related response headers
            proxy_pass_header Content-Range;
            proxy_pass_header Accept-Ranges;
            proxy_pass_header Content-Length;

            # Cache video segments at Nginx layer (simulates CDN)
            proxy_cache_bypass $http_range;

            add_header X-Proxy "nginx-video-gateway";
        }
    }
}
