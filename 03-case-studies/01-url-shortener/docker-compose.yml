services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d urlshortener"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cache:
    image: redis:7
    # Configure Redis to demonstrate the LRU eviction policy discussed in
    # the README Interview Checklist Q8. maxmemory is set low (64mb) so the
    # experiment can actually observe eviction behaviour locally.
    # In production, tune maxmemory to leave ~20% headroom on the host.
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    image: python:3.11-slim
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app:secret@db:5432/urlshortener
      REDIS_URL: redis://cache:6379
      FLASK_ENV: development
    volumes:
      - ./app.py:/app.py
    command: >
      sh -c "pip install flask psycopg2-binary redis --quiet &&
             python /app.py"
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
