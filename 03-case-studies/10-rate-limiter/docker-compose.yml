services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api1:
    image: python:3.11-slim
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      SERVER_ID: "api1"
    volumes:
      - ./api_server.py:/api_server.py
    # Pin library versions for reproducibility; quiet suppresses progress noise
    command: >
      sh -c "pip install flask==3.0.3 redis==5.0.8 --quiet && python /api_server.py"
    ports:
      - "8001:8000"
    # Restart on failure so a transient pip install hiccup doesn't leave
    # the container silently stopped (docker compose ps would show "Exited").
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  api2:
    image: python:3.11-slim
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      SERVER_ID: "api2"
    volumes:
      - ./api_server.py:/api_server.py
    command: >
      sh -c "pip install flask==3.0.3 redis==5.0.8 --quiet && python /api_server.py"
    ports:
      - "8002:8000"
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  nginx:
    image: nginx:alpine
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
