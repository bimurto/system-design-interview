events {
    worker_connections 1024;
}

http {
    # Log to stdout/stderr so `docker compose logs nginx` captures traffic
    access_log  /dev/stdout;
    error_log   /dev/stderr warn;

    upstream api_backend {
        server api1:8000;
        server api2:8000;
        # Round-robin (default). Because rate-limit state lives in Redis,
        # the load-balancing algorithm does NOT affect correctness — any
        # server can handle any request and they all share the same counter.
    }

    server {
        listen 8080;

        # Conservative timeouts: rate-limit checks should complete in <1ms
        proxy_connect_timeout   2s;
        proxy_send_timeout      5s;
        proxy_read_timeout      5s;

        location / {
            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Propagate rate-limit headers back to the caller unchanged
            proxy_pass_header  X-RateLimit-Limit;
            proxy_pass_header  X-RateLimit-Remaining;
            proxy_pass_header  X-RateLimit-Reset;
            proxy_pass_header  Retry-After;
            proxy_pass_header  X-Server;
            proxy_pass_header  X-Redis-Available;
        }

        location /health {
            proxy_pass http://api_backend;
        }
    }
}
