services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: whatsapp
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d whatsapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  cache:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ws_server:
    image: python:3.11-slim
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app:secret@db:5432/whatsapp
      REDIS_URL: redis://cache:6379
    volumes:
      - ./ws_server.py:/ws_server.py
    command: >
      sh -c "pip install websockets psycopg2-binary redis --quiet &&
             python /ws_server.py"
    ports:
      - "8765:8765"
    # Healthcheck uses a proper WebSocket upgrade handshake (HTTP 101) rather than
    # a raw TCP connect, which only proves the port is open, not that the server
    # is accepting WebSocket connections.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"\nimport socket, hashlib, base64, os\ns = socket.socket()\ns.settimeout(3)\ns.connect(('localhost', 8765))\nkey = base64.b64encode(os.urandom(16)).decode()\nhs = f'GET / HTTP/1.1\\r\\nHost: localhost\\r\\nUpgrade: websocket\\r\\nConnection: Upgrade\\r\\nSec-WebSocket-Key: {key}\\r\\nSec-WebSocket-Version: 13\\r\\n\\r\\n'\ns.send(hs.encode())\nresp = s.recv(256).decode(errors='ignore')\nassert '101' in resp, f'bad response: {resp}'\ns.close()\n\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
