services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: whatsapp
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d whatsapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  cache:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ws_server:
    image: python:3.11-slim
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app:secret@db:5432/whatsapp
      REDIS_URL: redis://cache:6379
    volumes:
      - ./ws_server.py:/ws_server.py
    command: >
      sh -c "pip install websockets psycopg2-binary redis --quiet &&
             python /ws_server.py"
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',8765)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
