services:
  redis-1:
    image: redis:7
    ports:
      - "7001:7001"
    command: >
      redis-server
        --port 7001
        --bind 0.0.0.0
        --protected-mode no
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --cluster-require-full-coverage no
        --cluster-announce-ip redis-1
        --cluster-announce-port 7001
        --appendonly yes
        --appendfsync everysec
        --save 60 1
        --maxmemory 100mb
        --maxmemory-policy allkeys-lru
        --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7001", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-2:
    image: redis:7
    ports:
      - "7002:7002"
    command: >
      redis-server
        --port 7002
        --bind 0.0.0.0
        --protected-mode no
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --cluster-require-full-coverage no
        --cluster-announce-ip redis-2
        --cluster-announce-port 7002
        --appendonly yes
        --appendfsync everysec
        --save 60 1
        --maxmemory 100mb
        --maxmemory-policy allkeys-lru
        --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7002", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-3:
    image: redis:7
    ports:
      - "7003:7003"
    command: >
      redis-server
        --port 7003
        --bind 0.0.0.0
        --protected-mode no
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --cluster-require-full-coverage no
        --cluster-announce-ip redis-3
        --cluster-announce-port 7003
        --appendonly yes
        --appendfsync everysec
        --save 60 1
        --maxmemory 100mb
        --maxmemory-policy allkeys-lru
        --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7003", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  cluster-init:
    image: redis:7
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
    command: >
      bash -c "
        sleep 2 &&
        redis-cli --cluster create redis-1:7001 redis-2:7002 redis-3:7003
          --cluster-replicas 0 --cluster-yes &&
        echo 'Cluster init complete — all 16384 slots covered'
      "
    restart: "no"
