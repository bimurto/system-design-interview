services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok" ]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app -d notifications" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis is used in production for:
  #   - User preference cache (HSET user:prefs:{id} email 1 push 1 ...)
  #   - Idempotency key dedup store (SET dedup:{key}:{channel} 1 EX 86400)
  #   - Per-user rate-limit counters (INCR notif:rl:{user_id}:{channel}:{minute})
  # The experiment uses Postgres for simplicity; this service is here to let
  # learners explore the Redis data structures described in the README.
  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  workers:
    image: python:3.11-slim
    depends_on:
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DATABASE_URL: postgresql://app:secret@db:5432/notifications
      REDIS_URL: redis://redis:6379
    volumes:
      - ./experiment.py:/experiment.py
    command: >
      sh -c "pip install kafka-python-ng psycopg2-binary redis --quiet && python /experiment.py"
    profiles:
      - experiment
