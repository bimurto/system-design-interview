services:
  elasticsearch:
    image: elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # Heap: set to half available RAM, max 4g. 512m is fine for local lab.
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # Disable swapping — ES performance degrades badly if heap is swapped
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
    ulimits:
      # ES requires high open-file and memlock limits
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    volumes:
      # Named volume keeps index data across container restarts within a lab session.
      # Wiped on `docker compose down -v` (teardown step in the lab).
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  indexer:
    image: python:3.11-slim
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ES_URL: http://elasticsearch:9200
    working_dir: /app
    volumes:
      - ./experiment.py:/app/experiment.py
    # Install deps then run experiment
    command: >
      sh -c "pip install elasticsearch --quiet && python experiment.py"

volumes:
  esdata:
