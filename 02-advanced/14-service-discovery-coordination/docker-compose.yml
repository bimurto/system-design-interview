services:
  etcd0:
    image: quay.io/etcd-io/etcd:v3.5.9
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd0:2380
      - --initial-cluster=etcd0=http://etcd0:2380,etcd1=http://etcd1:2380,etcd2=http://etcd2:2380
      - --initial-cluster-token=etcd-cluster-token
      - --initial-cluster-state=new
      # Compact history every 5 minutes — in production this is tuned to your
      # watch reconnect window. Experiment Phase 3 stays well within this window.
      - --auto-compaction-mode=periodic
      - --auto-compaction-retention=5m
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  etcd1:
    image: quay.io/etcd-io/etcd:v3.5.9
    command:
      - etcd
      - --name=etcd1
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd1:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd1:2380
      - --initial-cluster=etcd0=http://etcd0:2380,etcd1=http://etcd1:2380,etcd2=http://etcd2:2380
      - --initial-cluster-token=etcd-cluster-token
      - --initial-cluster-state=new
      - --auto-compaction-mode=periodic
      - --auto-compaction-retention=5m
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  etcd2:
    image: quay.io/etcd-io/etcd:v3.5.9
    command:
      - etcd
      - --name=etcd2
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd2:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd2:2380
      - --initial-cluster=etcd0=http://etcd0:2380,etcd1=http://etcd1:2380,etcd2=http://etcd2:2380
      - --initial-cluster-token=etcd-cluster-token
      - --initial-cluster-state=new
      - --auto-compaction-mode=periodic
      - --auto-compaction-retention=5m
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  experiment:
    image: python:3.11-slim
    volumes:
      - ./experiment.py:/experiment.py
    # restart: on-failure ensures the script retries if etcd is not yet ready,
    # even after the health-check condition is met (health checks can pass
    # before the Raft cluster fully elects a leader).
    restart: on-failure
    command: >
      sh -c "pip install etcd3 grpcio grpcio-tools --quiet && python /experiment.py"
    depends_on:
      etcd0:
        condition: service_healthy
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
    environment:
      - ETCD_HOST=etcd0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
