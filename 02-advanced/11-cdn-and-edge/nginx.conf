events {
    worker_connections 1024;
}

http {
    # CDN-style cache zone: 10MB of key metadata, max 1GB of cached content
    proxy_cache_path /tmp/nginx_cache
        levels=1:2
        keys_zone=cdn_cache:10m
        max_size=1g
        inactive=60m
        use_temp_path=off;

    server {
        listen 80;

        # Health check endpoint (no caching)
        location /health {
            proxy_pass http://origin:8000/health;
        }

        # Main cacheable content
        location /content/ {
            proxy_pass http://origin:8000;
            proxy_cache cdn_cache;
            proxy_cache_valid 200 30s;
            proxy_cache_valid 404 5s;

            # Serve stale content while revalidating (stale-while-revalidate behavior)
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;

            # Respect origin Cache-Control headers
            proxy_cache_bypass $http_cache_control;

            # Expose cache status to client
            add_header X-Cache-Status $upstream_cache_status;
            add_header X-Cache-Key $scheme$proxy_host$request_uri;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # No-cache passthrough
        location /nocache/ {
            proxy_pass http://origin:8000;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header X-Cache-Status "BYPASS";
        }

        # Short TTL content
        location /short-ttl/ {
            proxy_pass http://origin:8000;
            proxy_cache cdn_cache;
            proxy_cache_valid 200 5s;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
