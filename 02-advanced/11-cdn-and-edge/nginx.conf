events {
    worker_connections 1024;
}

http {
    # CDN-style cache zone: 10MB of key metadata, max 1GB of cached content on disk.
    # keys_zone holds the in-memory index; actual response bodies go on disk.
    proxy_cache_path /tmp/nginx_cache
        levels=1:2
        keys_zone=cdn_cache:10m
        max_size=1g
        inactive=60m
        use_temp_path=off;

    # Log format that exposes cache status — makes it easy to grep hit/miss in logs.
    log_format cdn '$remote_addr [$time_local] "$request" $status '
                   'cache=$upstream_cache_status ms=$request_time';
    access_log /var/log/nginx/access.log cdn;

    server {
        listen 80;

        # ── Health check ──────────────────────────────────────────────────────
        # Bypasses caching entirely; proxied directly to the origin.
        location /health {
            proxy_pass http://origin:8000/health;
            proxy_set_header Host $host;
        }

        # ── Main cacheable content (30s TTL) ──────────────────────────────────
        # Simulates standard static-asset caching at a CDN PoP.
        # proxy_cache_lock prevents cache stampede: when many requests arrive
        # for an uncached item simultaneously, only ONE goes to origin; the rest
        # wait and are served from the freshly-populated cache entry.
        location /content/ {
            proxy_pass http://origin:8000;
            proxy_cache cdn_cache;
            proxy_cache_valid 200 30s;
            proxy_cache_valid 404 5s;

            # Serve stale while a background revalidation is in progress.
            # This avoids a latency spike when the cache entry is being refreshed.
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;

            # Stampede protection: only one upstream request for a cold cache key.
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;

            # Bypass when client explicitly sends Cache-Control: no-cache.
            # Using $http_pragma as well covers HTTP/1.0 Pragma: no-cache clients.
            # NOTE: We test the header value, not just presence, to avoid bypassing
            # on any request that happens to carry a Cache-Control header (e.g. max-age=0
            # from browser prefetch). The correct approach is a map variable.
            proxy_cache_bypass $cookie_nocache $arg_nocache;

            # Expose cache internals as response headers for the experiment.
            add_header X-Cache-Status $upstream_cache_status always;
            add_header X-Cache-Key   "$scheme$proxy_host$request_uri" always;

            proxy_set_header Host        $host;
            proxy_set_header X-Real-IP   $remote_addr;
        }

        # ── No-cache passthrough ──────────────────────────────────────────────
        # The origin sets Cache-Control: no-cache, no-store.
        # We also force bypass at the Nginx layer to be explicit about intent.
        # This models personalised or auth-gated responses that must never be cached.
        location /nocache/ {
            proxy_pass http://origin:8000;
            proxy_no_cache   1;
            proxy_cache_bypass 1;
            add_header X-Cache-Status "BYPASS" always;
            proxy_set_header Host $host;
        }

        # ── Short-TTL content (5s) ────────────────────────────────────────────
        # Demonstrates TTL expiry: after 5s the cache entry is stale and the
        # next request triggers a fresh origin fetch (cache MISS).
        # proxy_cache_lock is intentionally enabled here too — important for
        # high-traffic endpoints where short TTLs cause frequent stampedes.
        location /short-ttl/ {
            proxy_pass http://origin:8000;
            proxy_cache cdn_cache;
            proxy_cache_valid 200 5s;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status always;
            proxy_set_header Host $host;
        }

        # ── stale-while-revalidate demo ───────────────────────────────────────
        # proxy_cache_background_update + proxy_cache_use_stale updating
        # implements SWR: serve stale immediately, fetch fresh in background.
        # The client never blocks on revalidation; at worst it sees content
        # up to (max-age + stale-while-revalidate) seconds old.
        location /swr/ {
            proxy_pass http://origin:8000;
            proxy_cache cdn_cache;
            proxy_cache_valid 200 5s;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status always;
            add_header X-Stale-Config "max-age=5, swr=10" always;
            proxy_set_header Host $host;
        }

        # ── Vary header demo ──────────────────────────────────────────────────
        # Origin sets Vary: Accept-Language, so Nginx creates a separate cache
        # entry per language value. The same URL cached for en, fr, and de
        # becomes 3 distinct entries — demonstrating cache fragmentation.
        location /vary/ {
            proxy_pass http://origin:8000;
            proxy_cache cdn_cache;
            proxy_cache_valid 200 60s;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status always;
            proxy_set_header Host            $host;
            proxy_set_header Accept-Language $http_accept_language;
        }

        # ── Private/authenticated content ─────────────────────────────────────
        # Origin sets Cache-Control: private, no-store.
        # We also set proxy_no_cache + proxy_cache_bypass at the Nginx layer
        # as a defence-in-depth measure — never cache auth responses even if
        # the origin accidentally forgets its Cache-Control header.
        location /private/ {
            proxy_pass http://origin:8000;
            proxy_no_cache   1;
            proxy_cache_bypass 1;
            add_header X-Cache-Status "BYPASS" always;
            proxy_set_header Host      $host;
            proxy_set_header X-User-Id $http_x_user_id;
        }
    }
}
