services:
  origin:
    image: python:3.11-slim
    volumes:
      - ./origin_server.py:/origin_server.py
    command: >
      sh -c "pip install flask --quiet && python /origin_server.py"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      origin:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/health" ]
      interval: 5s
      timeout: 3s
      retries: 10

  experiment:
    image: python:3.11-slim
    volumes:
      - ./experiment.py:/experiment.py
    command: >
      sh -c "pip install requests --quiet && python /experiment.py"
    depends_on:
      nginx:
        condition: service_healthy
    environment:
      - NGINX_HOST=nginx
      - ORIGIN_HOST=origin
