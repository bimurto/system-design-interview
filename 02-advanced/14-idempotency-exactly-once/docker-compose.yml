services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=payments
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "app", "-d", "payments"]
      interval: 5s
      timeout: 3s
      retries: 10

  payment-api:
    image: python:3.11-slim
    volumes:
      - ./payment_api.py:/payment_api.py
    command: >
      sh -c "pip install flask psycopg2-binary --quiet && python /payment_api.py"
    ports:
      - "8003:8003"
    environment:
      - DB_HOST=postgres
      - DB_NAME=payments
      - DB_USER=app
      - DB_PASSWORD=secret
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  experiment:
    image: python:3.11-slim
    volumes:
      - ./experiment.py:/experiment.py
    command: >
      sh -c "pip install requests psycopg2-binary --quiet && python /experiment.py"
    depends_on:
      payment-api:
        condition: service_healthy
    environment:
      - API_HOST=payment-api
      - DB_HOST=postgres
      - DB_NAME=payments
      - DB_USER=app
      - DB_PASSWORD=secret
