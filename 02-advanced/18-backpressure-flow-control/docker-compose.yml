services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    # Constrained memory mirrors a real broker with a bounded queue.
    # redis.conf limits the in-memory dataset so the queue cannot grow
    # without bound — exactly the bounded-buffer principle in practice.
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy noeviction
    deploy:
      resources:
        limits:
          memory: 96m
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
