services:
  experiment:
    image: python:3.11-slim
    volumes:
      - ./experiment.py:/experiment.py:ro
    command: python /experiment.py
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    healthcheck:
      test: [ "CMD", "python", "-c", "import hashlib, bisect, statistics; print('ok')" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s
