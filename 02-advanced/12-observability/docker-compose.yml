services:
  flask-app:
    image: python:3.11-slim
    volumes:
      - ./flask_app.py:/flask_app.py
    command: >
      sh -c "pip install flask prometheus_client --quiet && python /flask_app.py"
    ports:
      - "8000:8000"
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    # Retain 7 days of data — sufficient for the lab, avoids unbounded disk growth.
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      flask-app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    volumes:
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/app.json:ro
      - ./grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/app.json
    depends_on:
      prometheus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Run experiment separately: `docker compose run --rm experiment`
  # or: `python experiment.py` (with docker compose up -d flask-app prometheus grafana)
  experiment:
    image: python:3.11-slim
    volumes:
      - ./experiment.py:/experiment.py
    command: >
      sh -c "pip install requests --quiet && python /experiment.py"
    # Only needs flask-app and prometheus — grafana is optional for the script.
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      - APP_HOST=flask-app
      - PROM_HOST=prometheus
    deploy:
      resources:
        limits:
          memory: 128m
    profiles:
      - experiment
