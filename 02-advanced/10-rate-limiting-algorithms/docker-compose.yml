services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  experiment:
    image: python:3.11-slim
    volumes:
      - ./experiment.py:/experiment.py
    command: >
      sh -c "pip install redis --quiet && python /experiment.py"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
