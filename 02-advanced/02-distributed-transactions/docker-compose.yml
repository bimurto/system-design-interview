services:
  db-orders:
    image: postgres:15
    command: postgres -c max_prepared_transactions=10
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-inventory:
    image: postgres:15
    command: postgres -c max_prepared_transactions=10
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory
      POSTGRES_USER: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
