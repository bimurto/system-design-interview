services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Use two listener names: one for internal container-to-container traffic,
      # one advertised to external clients (localhost). This is required on
      # Docker for Mac/Windows where network_mode:host is not available.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Kappa architecture relevance: long retention makes historical replay possible.
      # Default is 168 hours (7 days); set to -1 for infinite retention (size-limited).
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: -1
      # Limit log segment size to 256 MB so old segments are eligible for deletion sooner.
      KAFKA_LOG_SEGMENT_BYTES: 268435456
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  processor:
    image: python:3.11-slim
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./experiment.py:/experiment.py
    # Run via the external port so experiment.py needs no code changes for Docker mode.
    command: >
      bash -c "pip install kafka-python-ng -q && python /experiment.py"
    # Use a named network instead of network_mode:host — host networking is Linux-only
    # and silently fails on Docker Desktop (Mac/Windows), causing confusing connection errors.
    networks:
      - stream-net

networks:
  stream-net:
    driver: bridge
