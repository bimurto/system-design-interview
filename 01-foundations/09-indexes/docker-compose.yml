services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: indextest
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    command: postgres -c shared_buffers=256MB -c work_mem=64MB -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
