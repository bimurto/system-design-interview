events {
    worker_connections 1024;
}

http {
    # ── Upstream Definitions ───────────────────────────────────────────────────
    #
    # Round-robin (default): cycles through backends in order.
    # Each backend receives equal traffic regardless of speed or current load.
    # Use when: all backends are identical and request durations are similar.
    upstream backends_rr {
        server app1:8000;
        server app2:8000;
        server app3:8000;
        server app4:8000;

        # Passive health check: if a backend returns an error or times out,
        # Nginx marks it as failed and will not route to it for `fail_timeout`.
        # After fail_timeout seconds, Nginx probes it again with one request.
        # max_fails=1 means one error removes it; fail_timeout=10s is the penalty.
    }

    # Weighted round-robin: app1 carries 3x the traffic of app4.
    # Use when: backends have different capacities (CPU, memory, instance type)
    # or during canary deploys (app4 at weight=1 = ~10% of traffic for testing).
    upstream backends_wrr {
        server app1:8000 weight=3;
        server app2:8000 weight=2;
        server app3:8000 weight=3;
        server app4:8000 weight=1;  # canary / degraded node: gets ~11% traffic
    }

    # Least-connections: routes each new request to the backend with the fewest
    # currently active connections. Fast backends complete requests quickly and
    # accumulate fewer connections, naturally receiving more new requests.
    # Use when: request durations vary (file uploads, long-polling, streaming).
    #
    # IMPORTANT — slow_start: when a backend rejoins after a failure, Nginx
    # ramps its weight from 0 to the configured value over slow_start seconds
    # instead of immediately flooding it with traffic. Without slow_start, a
    # backend that just recovered gets hit with a thundering herd of connections
    # that can crash it again immediately. (slow_start requires Nginx Plus or
    # least_conn; it is not available in round-robin in open-source Nginx.)
    upstream backends_lc {
        least_conn;
        server app1:8000;
        server app2:8000;
        server app3:8000;
        server app4:8000;
    }

    # IP-hash: hashes the client source IP and consistently maps it to one backend.
    # Same client IP always reaches the same backend — session affinity.
    # Downside: if that backend fails, the session is lost. Uneven distribution
    # when many clients share an IP (NAT, corporate proxy).
    # Prefer stateless design (sessions in Redis) to avoid needing this.
    upstream backends_iphash {
        ip_hash;
        server app1:8000;
        server app2:8000;
        server app3:8000;
        server app4:8000;
    }

    server {
        listen 80;

        # Shared proxy timeouts applied globally via a map or per-location.
        # proxy_connect_timeout: max time to establish connection to backend.
        # proxy_read_timeout: max time to wait for backend response.
        # proxy_next_upstream: if a backend returns an error/timeout, Nginx
        # automatically retries on the next available backend (passive failover).

        # ── Round-Robin ───────────────────────────────────────────────────────
        location / {
            proxy_pass http://backends_rr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            # On error/timeout, retry on the next backend (passive health check).
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
        }

        # ── Weighted Round-Robin ──────────────────────────────────────────────
        location /wrr/ {
            rewrite ^/wrr(/.*)$ $1 break;
            proxy_pass http://backends_wrr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
        }

        # ── Least-Connections ─────────────────────────────────────────────────
        location /lc/ {
            rewrite ^/lc(/.*)$ $1 break;
            proxy_pass http://backends_lc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
        }

        # ── IP Hash ───────────────────────────────────────────────────────────
        location /iphash/ {
            rewrite ^/iphash(/.*)$ $1 break;
            proxy_pass http://backends_iphash;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            # NOTE: proxy_next_upstream is intentionally omitted for ip_hash.
            # Retrying on a different backend would break session affinity —
            # the whole point of ip_hash is deterministic routing.
        }

        # ── Nginx health check (used by docker-compose healthcheck) ───────────
        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
