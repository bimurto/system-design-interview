events {
    worker_connections 1024;
}

http {
    # Round-robin upstream (default — equal distribution regardless of backend speed)
    upstream backends_rr {
        server app1:8000;
        server app2:8000;
        server app3:8000;
        server app4:8000;
    }

    # Least-connections upstream (routes to backend with fewest active connections)
    upstream backends_lc {
        least_conn;
        server app1:8000;
        server app2:8000;
        server app3:8000;
        server app4:8000;
    }

    # IP-hash upstream (same client IP always routes to same backend)
    upstream backends_iphash {
        ip_hash;
        server app1:8000;
        server app2:8000;
        server app3:8000;
        server app4:8000;
    }

    server {
        listen 80;

        # Default: round-robin
        location / {
            proxy_pass http://backends_rr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        # Least-connections endpoint
        location /lc/ {
            rewrite ^/lc(/.*)$ $1 break;
            proxy_pass http://backends_lc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # IP-hash endpoint
        location /iphash/ {
            rewrite ^/iphash(/.*)$ $1 break;
            proxy_pass http://backends_iphash;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
