services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.auth
    ports:
      - "5001:5001"
    environment:
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-256-bit-secret-key-for-jwt-signing
      - SESSION_SECRET=your-session-secret-for-cookie-signing
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5001/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  protected-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5002:5002"
    environment:
      - JWT_SECRET=your-256-bit-secret-key-for-jwt-signing
      - AUTH_SERVICE_URL=http://auth-service:5001
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5002/health"]
      interval: 5s
      timeout: 3s
      retries: 3
