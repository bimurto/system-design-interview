server {
    listen 80;

    # Keep idle connections alive for up to 65s; allow up to 1000 reuses.
    # These directives are directly relevant to the keep-alive experiment —
    # the defaults (75s / 100 requests) are fine for this lab but surfacing
    # them here makes the config educational.
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Send-buffer tuning: nginx default is 8k; bumping to 256k avoids partial
    # writes on the 1MB and 10MB payloads and keeps the bandwidth measurement
    # cleaner (fewer syscalls, less user/kernel context-switching noise).
    send_timeout 30s;

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /1kb {
        alias /usr/share/nginx/html/1kb.bin;
        add_header Content-Type application/octet-stream;
        # Disable response buffering so timing reflects actual transfer, not
        # nginx buffer flush latency.
        proxy_buffering off;
    }

    location /100kb {
        alias /usr/share/nginx/html/100kb.bin;
        add_header Content-Type application/octet-stream;
    }

    location /1mb {
        alias /usr/share/nginx/html/1mb.bin;
        add_header Content-Type application/octet-stream;
    }

    location /10mb {
        alias /usr/share/nginx/html/10mb.bin;
        add_header Content-Type application/octet-stream;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
