services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  client:
    image: python:3.11-slim
    command: sleep infinity
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://nginx/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
