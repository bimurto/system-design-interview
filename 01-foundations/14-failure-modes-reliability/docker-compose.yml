services:
  # downstream: a controllable HTTP service that can be set to healthy, slow, or failing
  # via control endpoints (/slow, /fail, /recover). Simulates a real downstream dependency.
  downstream:
    image: python:3.11-slim
    ports:
      - "9001:9001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    command: >
      python -c "
      import http.server, json, time
      from http.server import BaseHTTPRequestHandler

      class H(BaseHTTPRequestHandler):
          fail_until = 0
          slow_until  = 0
          request_count = 0

          def log_message(self, *a): pass

          def do_GET(self):
              now = time.time()
              H.request_count += 1
              if self.path == '/fail':
                  H.fail_until = now + 15
                  self._json({'mode': 'failing', 'duration_s': 15})
              elif self.path == '/slow':
                  H.slow_until = now + 15
                  self._json({'mode': 'slow', 'duration_s': 15, 'sleep_s': 5})
              elif self.path == '/recover':
                  H.fail_until = 0
                  H.slow_until = 0
                  self._json({'mode': 'healthy'})
              elif self.path == '/health':
                  self._json({'status': 'ok', 'requests_served': H.request_count})
              elif self.path == '/stats':
                  self._json({
                      'requests_served': H.request_count,
                      'is_failing': now < H.fail_until,
                      'is_slow': now < H.slow_until,
                  })
              else:
                  if now < H.fail_until:
                      self.send_response(500)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({'error': 'internal error', 'mode': 'failing'}).encode())
                      return
                  is_slow = now < H.slow_until
                  if is_slow:
                      time.sleep(5)
                  self._json({'result': 'ok', 'latency_mode': 'slow' if is_slow else 'normal'})

          def _json(self, d):
              body = json.dumps(d).encode()
              self.send_response(200)
              self.send_header('Content-Type', 'application/json')
              self.send_header('Content-Length', len(body))
              self.end_headers()
              self.wfile.write(body)

      http.server.HTTPServer(('0.0.0.0', 9001), H).serve_forever()
      "
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9001/health', timeout=3)" ]
      interval: 5s
      timeout: 5s
      retries: 12
