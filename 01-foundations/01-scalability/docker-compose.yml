services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
      app3:
        condition: service_healthy

  app1:
    image: python:3.11-slim
    environment:
      - HOSTNAME=app1
    volumes:
      - ./app.py:/app/app.py:ro
    working_dir: /app
    command: python app.py
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  app2:
    image: python:3.11-slim
    environment:
      - HOSTNAME=app2
    volumes:
      - ./app.py:/app/app.py:ro
    working_dir: /app
    command: python app.py
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  app3:
    image: python:3.11-slim
    environment:
      - HOSTNAME=app3
    volumes:
      - ./app.py:/app/app.py:ro
    working_dir: /app
    command: python app.py
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
