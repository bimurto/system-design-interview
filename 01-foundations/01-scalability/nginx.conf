events {
    worker_connections 1024;
}

http {
    # Upstream pool — round-robin by default.
    # In Nginx Plus / OpenResty, replace with:
    #   least_conn;        # fewest active connections
    #   ip_hash;           # sticky sessions by client IP
    #   hash $request_uri; # consistent hashing for cache locality
    upstream backend {
        server app1:8000;
        server app2:8000;
        server app3:8000;

        # Keep persistent connections to backends so each upstream
        # request reuses a TCP connection instead of opening a new one.
        # Without this, high-QPS scenarios pay a TCP handshake penalty
        # on every request.
        keepalive 32;
    }

    server {
        listen 80;

        # Health check endpoint — Nginx itself responds, not a backend.
        # Useful for the load balancer's own health check in ELB / GCP LB.
        location /nginx-health {
            return 200 "nginx OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://backend;

            # Preserve original client information for app-layer logging.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Required to reuse keepalive connections to upstream.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeout tuning — critical for production sizing discussions:
            #   connect_timeout: how long to wait for the TCP handshake
            #   send_timeout:    how long to wait between two writes from client
            #   read_timeout:    how long to wait between two reads from backend
            proxy_connect_timeout 2s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;

            # Passive health check: on error or timeout, retry the *next*
            # upstream server instead of returning 502 to the client.
            # This is Nginx open-source's health model — it marks a backend
            # "down" after `max_fails` failures within `fail_timeout` seconds.
            # Nginx Plus adds active health checks (periodic /health probes).
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
        }
    }
}
