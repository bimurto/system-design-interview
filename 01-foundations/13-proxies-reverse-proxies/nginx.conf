worker_processes auto;  # one worker per CPU core; default is 1 — a common bottleneck

events {
    worker_connections 1024;
}

http {
    # ── Connection pooling to backends ──────────────────────────────
    # Keep 32 idle keepalive connections per worker to each upstream.
    # Without this, nginx opens a new TCP connection per request (HTTP/1.0
    # semantics), which adds latency and burns file descriptors on backends.
    upstream backends {
        server backend1:8081;
        server backend2:8082;

        # Passive health checking: after 3 failures in 30 s, mark server down.
        # nginx will stop sending traffic to it and retry after 30 s.
        # (Active health checks require nginx Plus; this is the OSS equivalent.)
        # max_fails and fail_timeout are set per server, not in keepalive block.
        keepalive 32;
    }

    # Upstream for the "users" service — used for path-based routing demo
    upstream users_backend {
        server backend1:8081 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # Upstream for the "orders" service — separate pool, different failover policy
    upstream orders_backend {
        server backend2:8082 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    server {
        listen 80;

        # ── Timeouts ─────────────────────────────────────────────────
        # proxy_connect_timeout: how long to wait for a TCP connection to backend
        # proxy_read_timeout:    how long to wait for the backend to send data
        # proxy_send_timeout:    how long to wait for the backend to accept data
        # These are critical in production — forgetting them means a hung backend
        # causes nginx to hold the client connection open indefinitely.
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;

        # ── Header forwarding ─────────────────────────────────────────
        # X-Real-IP: set from the actual TCP socket — clients cannot forge this.
        # X-Forwarded-For: OVERWRITE (not append) by setting it explicitly.
        #   Using $proxy_add_x_forwarded_for would *append* to any client-supplied
        #   XFF header, allowing IP spoofing. By setting it to $remote_addr we
        #   discard the client-supplied value and only expose what nginx observed.
        # Host: preserve the original Host header so backends know the hostname.
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host            $host;

        # Required to enable keepalive connections to backends
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ── Default route: round-robin load balancing ─────────────────
        location / {
            proxy_pass http://backends;
        }

        # ── Path-based routing: /api/users/* → backend1 only ─────────
        # Demonstrates how an API gateway routes by URL prefix to a dedicated
        # backend pool. In a real system each upstream would be a different service.
        location /api/users/ {
            proxy_pass http://users_backend;
        }

        # ── Path-based routing: /api/orders/* → backend2 only ────────
        location /api/orders/ {
            proxy_pass http://orders_backend;
        }

        # ── Health endpoint answered directly by nginx ────────────────
        # No backend involved — nginx responds immediately. Used by load balancers
        # above nginx to probe whether this proxy instance is alive.
        location /health {
            return 200 '{"status":"ok","proxy":"nginx"}\n';
            add_header Content-Type application/json;
        }
    }
}
