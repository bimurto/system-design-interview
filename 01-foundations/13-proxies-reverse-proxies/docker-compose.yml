services:
  nginx:
    image: nginx:1.25
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend1:
    image: python:3.11-slim
    environment:
      - BACKEND_ID=backend-1
      - PORT=8081
    ports:
      - "8081:8081"
    command: >
      python -c "
      import os, http.server, json
      from http.server import BaseHTTPRequestHandler
      class H(BaseHTTPRequestHandler):
          def log_message(self, *a): pass
          def do_GET(self):
              body = json.dumps({
                  'backend': os.environ['BACKEND_ID'],
                  'path': self.path,
                  'x_forwarded_for': self.headers.get('X-Forwarded-For', ''),
                  'x_real_ip': self.headers.get('X-Real-IP', ''),
                  'host': self.headers.get('Host', ''),
              }).encode()
              self.send_response(200)
              self.send_header('Content-Type', 'application/json')
              self.send_header('Content-Length', len(body))
              self.end_headers()
              self.wfile.write(body)
      http.server.HTTPServer(('0.0.0.0', int(os.environ['PORT'])), H).serve_forever()
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend2:
    image: python:3.11-slim
    environment:
      - BACKEND_ID=backend-2
      - PORT=8082
    ports:
      - "8082:8082"
    command: >
      python -c "
      import os, http.server, json
      from http.server import BaseHTTPRequestHandler
      class H(BaseHTTPRequestHandler):
          def log_message(self, *a): pass
          def do_GET(self):
              body = json.dumps({
                  'backend': os.environ['BACKEND_ID'],
                  'path': self.path,
                  'x_forwarded_for': self.headers.get('X-Forwarded-For', ''),
                  'x_real_ip': self.headers.get('X-Real-IP', ''),
                  'host': self.headers.get('Host', ''),
              }).encode()
              self.send_response(200)
              self.send_header('Content-Type', 'application/json')
              self.send_header('Content-Length', len(body))
              self.end_headers()
              self.wfile.write(body)
      http.server.HTTPServer(('0.0.0.0', int(os.environ['PORT'])), H).serve_forever()
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
